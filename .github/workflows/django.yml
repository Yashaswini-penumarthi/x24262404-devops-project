build_and_test:
  runs-on: ubuntu-latest
  needs: prebuild

  steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint coverage

    # -------------------------
    # Pylint full project linting
    # -------------------------
    - name: Run Pylint
      continue-on-error: true
      run: |
        pylint main --ignore=migrations || true

    # -------------------------
    # Django Unit Tests with Coverage
    # -------------------------
    - name: Run tests with coverage
      run: |
        coverage run --source='.' manage.py test
        coverage xml -i

    # -------------------------
    # Sonar Cloud Scan
    # -------------------------
    - name: Install Sonar Scanner
      run: |
        wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
        unzip sonar-scanner-cli-5.0.1.3006-linux.zip
        mv sonar-scanner-5.0.1.3006-linux sonar-scanner
        echo "${{ github.workspace }}/sonar-scanner/bin" >> $GITHUB_PATH

    - name: Version
      run: |
        sonar-scanner --version

    - name: Run Sonar Cloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
        SONAR_ORG: ${{ secrets.SONAR_ORG }}
      run: |
        sonar-scanner \
          -Dsonar.login=$SONAR_TOKEN \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.projectKey=$SONAR_PROJECT_KEY \
          -Dsonar.organization=$SONAR_ORG \
          -Dsonar.sources=. \
          -Dsonar.python.coverage.reportPaths=coverage.xml \
          -Dsonar.exclusions=.c9/**,**/migrations/**,**/__pycache__/**,**/tests.py \
          -Dsonar.coverage.exclusions=**/*
    
        sleep 5
        curl "https://sonarcloud.io/api/qualitygates/project_status?projectKey=$SONAR_PROJECT_KEY" > sonar_result.json
        cat sonar_result.json

    - name: Create deployment package
      run: |
        echo "Creating deploy.zip package..."
        zip -r deploy.zip . \
          -x "*.git*" \
          -x "*__pycache__*" \
          -x "*.pyc" \
          -x ".c9/*" \
          -x "coverage.xml" \
          -x ".coverage" \
          -x "sonar-scanner*" \
          -x "*.zip" \
          -x ".pytest_cache/*" \
          -x ".github/*"
        echo "deploy.zip created successfully"
        ls -lh deploy.zip

    - name: Upload deployment artifact
      uses: actions/upload-artifact@v4
      with:
        name: deploy-package
        path: deploy.zip
        retention-days: 5
        if-no-files-found: error  # This will fail if deploy.zip isn't found