 -y java-common","          wget https://corretto.aws/downloads/latest/amazon-corretto-17-x64-linux-jdk.deb","          sudo dpkg -i amazon-corretto-17-x64-linux-jdk.deb","          export PATH=$JAVA_HOME/bin:$PATH","          echo \"$java -version\"","          echo \"Java version: $(java --version)\"","          echo \"Java installation done\"","","      ","","","      # - name: Install Sonar Scanner","      #   run: |","      #     wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip","      #     unzip sonar-scanner-cli-5.0.1.3006-linux.zip","      #     export PATH=$PATH:./sonar-scanner-5.0.1.3006-linux/bin/","      #     sonar-scanner --version","      #     echo \"pre build stage completed\"","","","","  # =====================================================================","  # 2️⃣ BUILD + TEST STAGE (Sonar Scan, Pylint, Django Tests)","  # =====================================================================","  build_and_test:","    runs-on: ubuntu-latest","    needs: prebuild","","    steps:","      - name: Checkout repo","        uses: actions/checkout@v3","","      - name: Set up Python","        uses: actions/setup-python@v4","        with:","          python-version: \"3.11\"","","      - name: Install Dependencies","        run: |","          pip install --upgrade pip","          pip install -r requirements.txt","          pip install pylint","","      - name: Run collectstatic","        run: |","          python manage.py collectstatic --noinput","","      # -------------------------","      # Pylint full project linting","      # -------------------------","      - name: Run Pylint","        continue-on-error: true","        run: |","          pylint spend_wise || true","","      # -------------------------","      # Django Unit Tests","      # -------------------------","      - name: Run Django Tests","        run: |","          python manage.py test home.tests.LoginTest","","      # ------