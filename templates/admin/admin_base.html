{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    :root {
      --ink: #bcbcbd;
      --sidebar-bg: #112133;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5f0e8;
      --muted: #5a6170;
      --panel: #15253b;
      --border: rgba(201,168,76,0.14);
      --danger: #e05a5a;
      --success: #4caf79;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--cream);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      z-index: 100;
      overflow-y: auto;
    }
    .sidebar-brand {
      padding: 32px 28px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
    }
    .sidebar-brand .logo-sub {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .sidebar-section {
      padding: 24px 20px 8px;
      font-size: 0.64rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .sidebar nav {
      flex: 1;
      padding: 8px 0;
    }
    .nav-item {
      display: block;
      padding: 11px 28px;
      font-size: 0.88rem;
      color: rgba(245,240,232,0.6);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: color 0.2s, background 0.2s;
      border-left: 2px solid transparent;
    }
    .nav-item i { width: 18px; text-align: center; font-size: 0.95rem; }
    .nav-item:hover {
      color: var(--cream);
      background: rgba(245,240,232,0.6);
      border-left-color: var(--gold);
    }
    .nav-item.active {
      color: var(--gold);
      background: rgba(201,168,76,0.1);
      border-left-color: var(--gold);
    }
    .nav-group { margin-bottom: 4px; }
    .nav-group-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 28px;
      font-size: 0.88rem;
      color: rgba(245,240,232,0.6);
      cursor: pointer;
      transition: color 0.2s;
      border-left: 2px solid transparent;
      user-select: none;
    }
    .nav-group-header i:first-child { width: 18px; text-align: center; }
    .nav-group-header .chevron { margin-left: auto; font-size: 0.7rem; transition: transform 0.2s; }
    .nav-group-header:hover { color: var(--cream); }
    .nav-group-content { display: none; background: rgba(0,0,0,0.15); }
    .nav-group-content.open { display: block; }
    .nav-sub-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 28px 9px 58px;
      font-size: 0.83rem;
      color: rgba(245,240,232,0.5);
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }
    .nav-sub-item:hover { color: var(--gold); }

    .sidebar-footer {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
    }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.84rem;
      color: var(--danger);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .logout-btn:hover { opacity: 1; }

    /* ── MAIN CONTENT ── */
    .main-content {
      margin-left: 260px;
      flex: 1;
      min-height: 100vh;
      background: var(--ink);
    }
    .top-bar {
      position: sticky;
      top: 0; z-index: 50;
      background: rgba(245,240,232,0.5);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: #000000;
      letter-spacing: 0.02em;
    }
    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.82rem;
      color: var(--muted);
    }
    .admin-badge {
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border);
      color: var(--gold);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }
    .page-body {
      padding: 48px;
    }

    /* ── CARDS & TABLES ── */
    .panel-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .panel-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--cream);
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
    }
    .data-table th {
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 24px;
      text-align: left;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 16px 24px;
      font-size: 0.88rem;
      color: rgba(245,240,232,0.8);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .data-table tbody tr:hover { background: rgba(201,168,76,0.04); }
    .data-table tbody tr:last-child td { border-bottom: none; }

    /* Form styles */
    .form-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 40px 48px;
    }
    .form-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 8px;
    }
    .form-section .subtitle {
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 40px;
    }
    .field-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 12px 16px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }
    .field-input:focus {
      border-color: var(--gold);
      background: rgba(201,168,76,0.05);
    }
    .field-input::placeholder { color: rgba(245,240,232,0.25); }
    select.field-input option { background: var(--panel); }
    .field-group { margin-bottom: 24px; }
    .btn-submit {
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 13px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-submit:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* Badges */
    .badge-gold { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; letter-spacing: 0.08em; }
    .badge-success { background: rgba(76,175,121,0.15); color: var(--success); border: 1px solid rgba(76,175,121,0.3); padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; }
    .badge-danger { background: rgba(224,90,90,0.15); color: var(--danger); border: 1px solid rgba(224,90,90,0.3); padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; }

    /* Action buttons */
    .action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
    }
    .action-btn-danger { background: rgba(224,90,90,0.1); color: var(--danger); }
    .action-btn-danger:hover { background: var(--danger); color: white; }
    .action-btn-primary { background: rgba(201,168,76,0.1); color: var(--gold); }
    .action-btn-primary:hover { background: var(--gold); color: var(--ink); }

    /* Modal overrides */
    .modal-content {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--cream);
    }
    .modal-header {
      background: rgba(201,168,76,0.08);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
    }
    .modal-header .modal-title { font-family: 'Playfair Display', serif; color: var(--cream); }
    .modal-footer { border-top: 1px solid var(--border); }
    .modal-body { padding: 28px; }
    .btn-close { filter: invert(1) opacity(0.6); }

    /* Page heading */
    .page-heading {
      margin-bottom: 36px;
    }
    .page-heading .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-heading .eyebrow::before {
      content: '';
      width: 20px; height: 1px;
      background: var(--gold);
      display: block;
    }
    .page-heading h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--cream);
    }

    /* Textarea */
    textarea.field-input { resize: vertical; min-height: 120px; }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="logo-text">⬡ Institvtum</div>
      <div class="logo-sub">Administration Panel</div>
    </div>
    <nav>
      <div class="sidebar-section">Navigation</div>
      <a href="{% url 'admin_panel' %}" class="nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>

      <div class="nav-group">
        <div class="nav-group-header" onclick="toggle(this)">
          <i class="bi bi-people-fill"></i> Students
          <i class="bi bi-chevron-right chevron"></i>
        </div>
        <div class="nav-group-content">
          <a href="{% url 'add_student' %}" class="nav-sub-item"><i class="bi bi-plus-circle"></i> Add Student</a>
          <a href="{% url 'manage_students' %}" class="nav-sub-item"><i class="bi bi-list-ul"></i> Manage Students</a>
        </div>
      </div>

      <!-- <div class="nav-group">
        <div class="nav-group-header" onclick="toggle(this)">
          <i class="bi bi-person-badge-fill"></i> Faculty
          <i class="bi bi-chevron-right chevron"></i>
        </div>
        <div class="nav-group-content">
          <a href="{% url 'add_teacher' %}" class="nav-sub-item"><i class="bi bi-plus-circle"></i> Add Faculty</a>
          <a href="{% url 'manage_teachers' %}" class="nav-sub-item"><i class="bi bi-list-ul"></i> Manage Faculty</a>
        </div>
      </div> -->

      <div class="nav-group">
        <div class="nav-group-header" onclick="toggle(this)">
          <i class="bi bi-megaphone-fill"></i> Notices
          <i class="bi bi-chevron-right chevron"></i>
        </div>
        <div class="nav-group-content">
          <a href="{% url 'add_notice' %}" class="nav-sub-item"><i class="bi bi-plus-circle"></i> Add Notice</a>
          <a href="{% url 'manage_notices' %}" class="nav-sub-item"><i class="bi bi-list-ul"></i> Manage Notices</a>
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="{% url 'admin_logout' %}" class="logout-btn"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <div class="top-bar">
      <span class="top-bar-title">{% block top_title %}Administration{% endblock %}</span>
      <div class="top-bar-right">
        <span class="admin-badge"><i class="bi bi-shield-fill-check"></i> Admin</span>
      </div>
    </div>
    <div class="page-body">
      {% block body %}{% endblock %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggle(header) {
      const content = header.nextElementSibling;
      const chevron = header.querySelector('.chevron');
      content.classList.toggle('open');
      chevron.style.transform = content.classList.contains('open') ? 'rotate(90deg)' : '';
    }
  </script>
</body>
</html>
