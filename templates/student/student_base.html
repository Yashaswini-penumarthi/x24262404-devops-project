<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Student Portal{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    :root {
      --ink: #08100d;
      --sidebar: #1d3d32;
      --panel: #111820;
      --teal: #2a9d8f;
      --teal-light: #3bbcac;
      --cream: #f0ede8;
      --muted: #5a6580;
      --border: rgba(42,157,143,0.15);
      --gold: #c9a84c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--cream);
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 28px 24px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 0.03em;
    }
    .sidebar-brand .user-tag {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }
    .sidebar-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(42,157,143,0.15);
      border: 1px solid rgba(42,157,143,0.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--teal);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .nav-section {
      padding: 20px 16px 8px;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .s-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      font-size: 0.86rem;
      color: rgba(240,237,232,0.55);
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
      border-left: 2px solid transparent;
    }
    .s-nav-item i { width: 16px; text-align: center; }
    .s-nav-item:hover { color: var(--cream); background: rgba(42,157,143,0.07); border-left-color: var(--teal); }
    .s-nav-item.active { color: var(--teal); background: rgba(42,157,143,0.1); border-left-color: var(--teal); }
    .s-nav-item.logout { color: rgba(224,90,90,0.7); }
    .s-nav-item.logout:hover { color: #e05a5a; background: rgba(224,90,90,0.07); border-left-color: #e05a5a; }
    .sidebar-footer { margin-top: auto; padding: 20px 24px; border-top: 1px solid var(--border); }

    /* MAIN */
    .main-content {
      margin-left: 240px;
      flex: 1;
      min-height: 100vh;
      background: var(--ink);
    }
    .top-bar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8,12,16,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar-title {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--cream);
    }
    .student-badge {
      background: rgba(42,157,143,0.1);
      border: 1px solid rgba(42,157,143,0.25);
      color: var(--teal);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.73rem;
      letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 6px;
    }
    .page-body { padding: 44px 48px; }

    /* Cards and tables */
    .info-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .info-card-header {
      padding: 20px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .info-card-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--cream);
    }
    .info-table { width: 100%; border-collapse: collapse; }
    .info-table tr { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .info-table tr:last-child { border-bottom: none; }
    .info-table th {
      width: 180px;
      padding: 16px 24px;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 500;
      text-align: left;
      vertical-align: middle;
    }
    .info-table td {
      padding: 16px 24px;
      font-size: 0.9rem;
      color: rgba(240,237,232,0.85);
      vertical-align: middle;
    }
    .info-table tr:hover { background: rgba(42,157,143,0.04); }

    /* Field input in student panel */
    .field-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 12px 16px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-input:focus { border-color: var(--teal); background: rgba(42,157,143,0.05); }
    .field-input::placeholder { color: rgba(240,237,232,0.2); }
    .field-group { margin-bottom: 20px; }

    .btn-teal {
      background: var(--teal);
      color: var(--ink);
      border: none;
      padding: 12px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-teal:hover { background: var(--teal-light); transform: translateY(-1px); }

    .badge-teal { background: rgba(42,157,143,0.12); color: var(--teal); border: 1px solid rgba(42,157,143,0.25); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
    .badge-gold { background: rgba(201,168,76,0.12); color: var(--gold); border: 1px solid rgba(201,168,76,0.25); padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }

    .page-heading { margin-bottom: 32px; }
    .page-heading .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-heading .eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--teal); display: block; }
    .page-heading h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--cream); }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-avatar"><i class="bi bi-person-fill"></i></div>
      <div class="logo">Student Portal</div>
      <div class="user-tag">{{request.session.student_user}}</div>
    </div>
    <div class="nav-section">Navigation</div>
    <a href="{% url 'student_dashboard' %}" class="s-nav-item"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
    <a href="{% url 'view_notices' %}" class="s-nav-item"><i class="bi bi-megaphone-fill"></i> Notices</a>
    <a href="{% url 'student_settings' %}" class="s-nav-item"><i class="bi bi-gear-fill"></i> Settings</a>
    <div class="sidebar-footer">
      <a href="{% url 'student_logout' %}" class="s-nav-item logout" style="padding-left:0;border:none;"><i class="bi bi-box-arrow-left"></i> Sign Out</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="top-bar">
      <span class="top-bar-title">{% block top_title %}Student Portal{% endblock %}</span>
      <div class="student-badge"><i class="bi bi-mortarboard-fill"></i> Student Access</div>
    </div>
    <div class="page-body">
      {% block body %}{% endblock %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
