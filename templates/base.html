{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SMS – Student Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <style>
    :root {
      --ink: #0d1117;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5f0e8;
      --muted: #6b7280;
      --surface: rgba(255,255,255,0.04);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      height: 72px;
      background: rgba(13,17,23,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(201,168,76,0.18);
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }
    .nav-links a {
      color: rgba(245,240,232,0.75);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: color 0.25s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta {
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold) !important;
      padding: 7px 22px;
      border-radius: 3px;
      transition: background 0.25s, color 0.25s !important;
    }
    .nav-cta:hover { background: var(--gold) !important; color: var(--ink) !important; }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(135deg, rgba(13,17,23,0.82) 40%, rgba(13,17,23,0.55) 100%),
        url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1800&q=80') center/cover no-repeat;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      padding: 0 80px;
      max-width: 720px;
    }
    .hero-eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 36px; height: 1px;
      background: var(--gold);
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 700;
      line-height: 1.12;
      color: var(--cream);
      margin-bottom: 28px;
    }
    .hero h1 em {
      font-style: italic;
      color: var(--gold);
    }
    .hero p {
      font-size: 1.05rem;
      color: rgba(245,240,232,0.68);
      line-height: 1.75;
      margin-bottom: 44px;
      max-width: 520px;
    }
    .btn-gold {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--gold);
      color: var(--ink);
      border: none;
      padding: 14px 36px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.25s, transform 0.2s;
    }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); color: var(--ink); }
    .btn-outline-gold {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 13px 36px;
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .btn-outline-gold:hover { background: var(--gold); color: var(--ink); }

    /* ── NOTICES SECTION ── */
    .section {
      padding: 100px 80px;
    }
    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 28px; height: 1px;
      background: var(--gold);
    }
    .section h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 3vw, 2.6rem);
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 48px;
    }

    /* Notice table */
    .notice-table {
      width: 100%;
      border-collapse: collapse;
    }
    .notice-table thead tr {
      border-bottom: 1px solid rgba(201,168,76,0.35);
    }
    .notice-table th {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0 0 16px;
      font-weight: 500;
      text-align: left;
    }
    .notice-table tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s;
    }
    .notice-table tbody tr:hover { background: rgba(201,168,76,0.05); }
    .notice-table td {
      padding: 20px 0;
      color: rgba(245,240,232,0.82);
      font-size: 0.95rem;
      line-height: 1.6;
      vertical-align: top;
    }
    .notice-table td:first-child {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      color: var(--cream);
      width: 260px;
      padding-right: 40px;
    }
    .empty-notice {
      padding: 80px 0;
      text-align: center;
      color: var(--muted);
      font-size: 1rem;
    }
    .empty-notice i { font-size: 2.5rem; margin-bottom: 16px; display: block; color: rgba(201,168,76,0.35); }

    /* Divider */
    .gold-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.3;
    }

    /* Footer */
    footer {
      padding: 40px 80px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header>
    <a class="brand" href="{% url 'home' %}">⬡ Institvtum</a>
    <ul class="nav-links">
      <li><a href="{% url 'home' %}">Home</a></li>
      <li><a href="{% url 'admin_panel' %}">Admin</a></li>
      <li><a href="{% url 'student_login' %}" class="nav-cta">Student Login</a></li>
    </ul>
  </header>

  {% block body %}{% endblock %}

  <footer>
    <span>© 2025 Institvtum — Student Management System</span>
    <span>Academic Excellence Portal</span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
